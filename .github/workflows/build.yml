name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Web bundle → GitHub Pages. The installable PWA at dedtxt.app is the only
  # shipping target right now. Self-gated on lint + JS tests; cheap to run on
  # every push and PR.
  web:
    name: web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build:web

      - name: Upload web bundle
        uses: actions/upload-artifact@v4
        with:
          name: dedtxt-web
          path: dist-web/**

      - name: Deploy to gh-pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dist-web
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'deploy: ${{ github.sha }}'

  # Keeps the paused desktop / Tauri (Rust) code compiling and its unit tests
  # green on every push/PR, so the desktop target stays ready to revive (see
  # FUTURE.md). Does NOT build installers — that's the disabled `desktop` job.
  desktop-check:
    name: desktop-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux deps (WebKitGTK — needed to compile the Tauri crate)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            patchelf

      - name: Cache Rust target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm deps
        run: npm ci

      - name: Generate icons
        run: npm run gen:icons

      - name: Unit tests (Rust) + compile check
        run: cargo test --manifest-path src-tauri/Cargo.toml

  # ── DESKTOP BUILDS: PAUSED ────────────────────────────────────────────────
  # Native desktop installers (Tauri, ~5–15 MB each) are deprecated for now —
  # the PWA is the shipping target (see FUTURE.md). This job is preserved, not
  # deleted, so it can be revived: flip `if:` back to the trigger shown, re-add
  # the `tags: ['v*']` push filter at the top, and re-enable the `release` job
  # below. The desktop CODE stays verified by `desktop-check` above.
  desktop:
    name: desktop / ${{ matrix.os }}
    if: ${{ false }}   # paused — was: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          # On macOS we need both x86_64 and aarch64 targets so the build
          # below can produce a single universal binary that runs natively
          # on Intel and Apple Silicon. No-op on Linux/Windows.
          targets: ${{ runner.os == 'macOS' && 'x86_64-apple-darwin,aarch64-apple-darwin' || '' }}

      - name: Install Linux build deps (WebKitGTK, AppImage tooling)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            patchelf \
            rpm

      - name: Cache Rust target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm deps
        run: npm ci

      - name: Generate icons
        run: npm run gen:icons

      - name: Build Tauri bundle (macOS universal)
        if: runner.os == 'macOS'
        run: npx tauri build --target universal-apple-darwin

      - name: Build Tauri bundle
        if: runner.os != 'macOS'
        run: npx tauri build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dedtxt-${{ runner.os }}
          if-no-files-found: error
          # `**` matches both target/release/bundle (Linux/Windows) and
          # target/universal-apple-darwin/release/bundle (macOS universal).
          path: |
            src-tauri/target/**/release/bundle/dmg/*.dmg
            src-tauri/target/**/release/bundle/macos/*.app.tar.gz
            src-tauri/target/**/release/bundle/msi/*.msi
            src-tauri/target/**/release/bundle/nsis/*.exe
            src-tauri/target/**/release/bundle/deb/*.deb
            src-tauri/target/**/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage

  # ── RELEASE: PAUSED ───────────────────────────────────────────────────────
  # Publishes the desktop installers to a GitHub Release. Paused alongside the
  # `desktop` job; re-enable both together (and restore the `tags: ['v*']` push
  # trigger) to ship native builds again.
  release:
    name: release
    if: ${{ false }}   # paused — was: startsWith(github.ref, 'refs/tags/v')
    needs: [desktop, web]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/dedtxt-macOS/**
            artifacts/dedtxt-Windows/**
            artifacts/dedtxt-Linux/**
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

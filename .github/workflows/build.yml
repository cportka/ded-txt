name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Desktop installers are heavy (~80 MB each) and Electron-bound. Only build
  # them when intentionally cutting a release (tag v*) or manually triggered.
  desktop:
    name: desktop / ${{ matrix.os }}
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install rpm (Linux only)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends rpm

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: npx electron-builder --mac --publish never

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: npx electron-builder --win --publish never

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: npx electron-builder --linux --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dedtxt-${{ runner.os }}
          if-no-files-found: error
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
            dist/latest*.yml

  # Web bundle is < 1 MB and feeds the live GitHub Pages site. Cheap to run
  # on every push and PR.
  web:
    name: web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run build:web

      - name: Upload web bundle
        uses: actions/upload-artifact@v4
        with:
          name: dedtxt-web
          path: dist-web/**

      - name: Deploy to gh-pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dist-web
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'deploy: ${{ github.sha }}'

  android:
    name: android
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: android-actions/setup-android@v3

      - run: npm ci
      - run: npm run build:web

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: dedtxt-android
          if-no-files-found: error
          path: android/app/build/outputs/apk/debug/app-debug.apk

  ios:
    name: ios
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - run: npm ci
      - run: npm run build:web

      - name: Add iOS platform if missing
        run: |
          if [ ! -d ios ]; then
            npx cap add ios
          fi
          npx cap sync ios

      - name: Build iOS (Simulator, unsigned)
        working-directory: ios/App
        run: |
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Package .app
        working-directory: ios/App
        run: |
          mkdir -p ../../dist-mobile
          cp -R build/Build/Products/Debug-iphonesimulator/App.app ../../dist-mobile/DedTxt.app
          cd ../../dist-mobile
          zip -ry DedTxt-iOS-Simulator.zip DedTxt.app

      - name: Upload .app
        uses: actions/upload-artifact@v4
        with:
          name: dedtxt-ios-simulator
          if-no-files-found: error
          path: dist-mobile/DedTxt-iOS-Simulator.zip

  release:
    name: release
    needs: [desktop, web, android, ios]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/dedtxt-macOS/**
            artifacts/dedtxt-Windows/**
            artifacts/dedtxt-Linux/**
            artifacts/dedtxt-android/**
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

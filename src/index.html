<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data:; manifest-src 'self'; worker-src 'self';" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111111" id="theme-color-meta" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="DedTxt" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icons/favicon.png" type="image/png" />
  <link rel="apple-touch-icon" href="./icons/icon-512.png" />
  <script src="./theme-init.js"></script>
  <title>DedTxt</title>
  <style>
    :root[data-theme="dark"] {
      color-scheme: dark;
      --bg: #111111;
      --fg: #f4f4f4;
      --muted: #666666;
    }
    :root[data-theme="light"] {
      color-scheme: light;
      --bg: #ffffff;
      --fg: #111111;
      --muted: #999999;
    }
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      /* Defense against any stray horizontal overflow — we never want a
         horizontal scrollbar; wrapping should always handle width. */
      overflow-x: hidden;
    }
    body {
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      box-sizing: border-box;
      position: relative;
    }

    /* Editor + gutter live in a flex row that fills the viewport. */
    #editor-wrap {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: stretch;
    }

    /* Subtle line-number gutter. overflow:hidden + inner translateY for
       scroll-sync (programmatic scrollTop on overflow:hidden is unreliable). */
    #line-gutter {
      flex: 0 0 auto;
      width: 40px;
      height: 100%;
      overflow: hidden;
      pointer-events: none;
      user-select: none;
      background: transparent;
    }
    #line-gutter-inner {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      font-size: 14px;
      line-height: 1.45;
      color: var(--muted);
      opacity: 0.55;
      padding: 12px 6px 12px 0;
      box-sizing: border-box;
      text-align: right;
      white-space: pre;
      will-change: transform;
    }

    /* The textarea must NOT use `width: 100%` here — in a flex row with the
       gutter (40px), 100% + 40px > parent and the body picks up a horizontal
       scrollbar, which then shifts position:fixed elements. Letting flex own
       the width via `flex: 1 1 auto; min-width: 0` is correct. */
    #text-editor {
      display: block;
      flex: 1 1 auto;
      min-width: 0;
      margin: 0;
      border: 0;
      padding: 12px 14px;
      box-sizing: border-box;
      resize: none;
      background: transparent;
      color: inherit;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      font-size: 14px;
      line-height: 1.45;
      tab-size: 4;
      -moz-tab-size: 4;
      /* Soft wrap to the viewable area. NEVER inserts characters into .value. */
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      word-break: break-word;
      overflow-x: hidden;
      overflow-y: auto;
    }
    #text-editor:focus { outline: none; }
    #text-editor::placeholder { color: var(--muted); }

    /* Off-screen layout mirror — same font/padding/width/wrap as the textarea
       so per-line offsetHeight reports the correct wrapped row count. */
    #editor-mirror {
      position: absolute;
      visibility: hidden;
      pointer-events: none;
      top: 0;
      left: 0;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      font-size: 14px;
      line-height: 1.45;
      tab-size: 4;
      -moz-tab-size: 4;
      padding: 12px 14px;
      box-sizing: border-box;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    #editor-mirror > div {
      min-height: 1.45em;
    }

    #theme-toggle {
      position: fixed;
      bottom: max(6px, env(safe-area-inset-bottom));
      right: max(6px, env(safe-area-inset-right));
      width: 12px;
      height: 12px;
      padding: 0;
      margin: 0;
      border-radius: 50%;
      background: linear-gradient(90deg, var(--fg) 0 50%, var(--bg) 50% 100%);
      border: 1px solid var(--fg);
      cursor: pointer;
      opacity: 0.2;
      transition: opacity 0.15s ease;
      z-index: 10;
    }
    #theme-toggle:hover,
    #theme-toggle:focus-visible {
      opacity: 1;
      outline: none;
    }
    #menu-toggle {
      position: fixed;
      top: max(8px, env(safe-area-inset-top));
      right: max(8px, env(safe-area-inset-right));
      width: 32px;
      height: 32px;
      padding: 0;
      margin: 0;
      border-radius: 8px;
      background: transparent;
      color: var(--fg);
      border: 1px solid transparent;
      cursor: pointer;
      opacity: 0.55;
      transition: opacity 0.15s ease, border-color 0.15s ease;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #menu-toggle:hover,
    #menu-toggle:focus-visible {
      opacity: 1;
      border-color: var(--muted);
      outline: none;
    }
    #menu-toggle img {
      display: block;
      width: 100%;
      height: 100%;
      border-radius: 6px;
      pointer-events: none;
    }
    /* Click feedback: a quick accelerate-spin-decelerate, 1s total. The class
       is added by renderer.js on click and removed via animationend so a
       second click can re-trigger it cleanly. */
    #menu-toggle.spinning img {
      /* Snap to full speed on press, then decelerate to a stop over 1 s.
         cubic-bezier(0.05, 0.9, 0.25, 1) jumps the rotation to ~90% of the
         way around within the first ~25% of the duration, then eases the
         remaining ~10% gently to the end. */
      animation: menu-spin 1000ms cubic-bezier(0.05, 0.9, 0.25, 1);
    }
    @keyframes menu-spin {
      0%   { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* First-visit / version-bump welcome dialog. Themed via the same CSS
       variables as the editor so it follows light/dark automatically.
       Caps at viewport height so phones never lose the "Ok" button below
       the chrome bar — the card scrolls internally if content overflows. */
    dialog#welcome-dialog {
      border: none;
      padding: 0;
      background: transparent;
      color: var(--fg);
      max-width: min(240px, calc(100% - 32px));
      max-height: calc(100vh - 32px);
      max-height: calc(100dvh - 32px);
      outline: none;
    }
    dialog#welcome-dialog::backdrop {
      background: rgba(0, 0, 0, 0.55);
    }
    .welcome-card {
      background: var(--bg);
      border: 1px solid var(--muted);
      border-radius: 12px;
      padding: 16px 22px;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      line-height: 1.4;
      /* Use viewport units directly, not `100%` of parent. The parent <form>
         inside <dialog> has no explicit height (only a max-height on the
         dialog), so `max-height: 100%` resolves unpredictably across
         browsers and on iOS Safari collapses the card to roughly the height
         of the h1, hiding everything below it. */
      max-height: calc(100vh - 32px);
      max-height: calc(100dvh - 32px);
      overflow-y: auto;
      box-sizing: border-box;
    }
    .welcome-icon-btn {
      display: block;
      width: 100%;
      margin: 0 auto 6px;
      padding: 0;
      background: transparent;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      overflow: hidden;
    }
    .welcome-icon-btn:focus-visible {
      outline: 2px solid var(--muted);
      outline-offset: 2px;
    }
    .welcome-icon {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 16px;
    }
    /* Spin animation on icon click — reuses the menu-spin keyframe from
       the top-right hamburger so the easing/timing matches: snap to speed
       then decelerate over 1 s. */
    .welcome-icon-btn.spinning .welcome-icon {
      animation: menu-spin 1000ms cubic-bezier(0.05, 0.9, 0.25, 1);
    }
    .welcome-sub {
      /* Negative horizontal margins let the tagline extend past the card's
         22px side padding so the full sentence fits on one line at 14px. */
      margin: 0 -18px 2px;
      color: var(--muted);
      font-size: 14px;
      text-align: center;
      white-space: nowrap;
    }
    .welcome-version {
      margin: 0 0 12px;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
    }
    /* Clickable shortcut rows. Each runs its associated editor action when
       clicked (Save saves, New starts a new file, etc.).
       Subtle at-rest affordance (faint background + faint border) so the
       rows read as tappable buttons even on touch where there's no hover.
       :hover and :focus-visible are styled differently so programmatic
       focus (which iOS Safari treats as :focus-visible) doesn't make "New"
       look pre-selected on dialog open. */
    .welcome-shortcuts {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin: 0 0 12px;
    }
    .welcome-shortcut {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 6px 12px;
      background: rgba(127, 127, 127, 0.05);
      border: 1px solid rgba(127, 127, 127, 0.18);
      border-radius: 6px;
      color: var(--fg);
      font: inherit;
      font-size: 14px;
      cursor: pointer;
      text-align: left;
      width: 100%;
      transition: background 0.1s ease, border-color 0.1s ease;
    }
    .welcome-shortcut:hover {
      background: rgba(127, 127, 127, 0.18);
      border-color: var(--muted);
    }
    .welcome-shortcut:focus-visible {
      outline: 2px solid var(--muted);
      outline-offset: -2px;
    }
    .welcome-shortcut:active {
      background: rgba(127, 127, 127, 0.25);
    }
    /* Click-feedback flash. Triggered by JS adding .activating on click,
       removed once the action runs. Visible on both touch and mouse so
       users always get confirmation their selection registered. */
    .welcome-shortcut.activating {
      animation: welcome-flash 180ms ease-out;
    }
    @keyframes welcome-flash {
      0%, 40% { background: rgba(127, 127, 127, 0.45); border-color: var(--fg); }
      100%    { background: rgba(127, 127, 127, 0.05); border-color: rgba(127, 127, 127, 0.18); }
    }
    .welcome-shortcut-key {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      color: var(--muted);
      white-space: nowrap;
      font-size: 13px;
    }
    /* Hide keyboard-shortcut hints on touch-only devices — they don't apply,
       but the rows themselves are still tappable. */
    @media (any-hover: none) and (pointer: coarse) {
      .welcome-shortcut-key { display: none; }
    }

    .welcome-downloads {
      margin: 0 0 12px;
      padding: 8px 0 0;
      border-top: 1px solid var(--muted);
      text-align: center;
      font-size: 14px;
    }
    .welcome-downloads a {
      color: var(--fg);
      text-decoration: none;
      border-bottom: 1px solid var(--muted);
      padding-bottom: 1px;
    }
    .welcome-downloads a:hover {
      border-bottom-color: var(--fg);
    }
    .welcome-btn {
      display: block;
      margin: 0 auto;
      min-width: 100px;
      padding: 8px 24px;
      border-radius: 8px;
      /* Fixed gray (not theme-following) so it rhymes with the icon-popup
         bubble — both use the same soft gray + black-outline treatment. */
      border: 1px solid #000000;
      background: #bcbcbc;
      color: #000000;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
    }
    .welcome-btn:hover { opacity: 0.92; }

    /* Info popup shown when the icon is clicked. Positioned via JS based on
       the icon's bounding rect. Position: fixed so it survives the dialog's
       internal overflow (the dialog is in the top layer, so fixed children
       render above the backdrop). Pink bubble with black outline, mint-green
       byline, and a left-pointing chevron that anchors visually to the icon. */
    .info-popup {
      position: fixed;
      transform: translateY(-50%);
      background: #f2bbd1;
      color: #000000;
      border: 1px solid #000000;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      min-width: 160px;
      max-width: 220px;
      z-index: 9999;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.25);
    }
    .info-popup[hidden] { display: none; }
    .info-popup p { margin: 0; line-height: 1.4; color: #052115; }
    .info-popup p + p { margin-top: 4px; }
    .info-popup a {
      /* Classic hyperlink blue — high contrast against the gray bubble
         and immediately reads as a link. */
      color: #0645ad;
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .info-popup a:visited { color: #0b3d91; }
    /* Chevron: two stacked triangles (outline + fill) on the popup's left
       edge, pointing at the icon. */
    .info-popup::before,
    .info-popup::after {
      content: "";
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 0;
      height: 0;
    }
    .info-popup::before {
      right: 100%;
      border-top: 8px solid transparent;
      border-bottom: 8px solid transparent;
      border-right: 8px solid #000000;
    }
    .info-popup::after {
      right: 100%;
      margin-right: -1px;
      border-top: 7px solid transparent;
      border-bottom: 7px solid transparent;
      border-right: 7px solid #f2bbd1;
    }

    /* Heads-up notices in the welcome dialog. Data-driven by
       headsUpNotices() in welcome.js — single active notice renders
       inline ("Heads up — …"); multiple render under a shared "Heads up:"
       header with a bulleted list. */
    .welcome-heads-up {
      margin: 0 0 12px;
      padding: 8px 10px;
      border: 1px solid var(--muted);
      border-radius: 6px;
      font-size: 12px;
      line-height: 1.4;
      color: var(--muted);
    }
    .welcome-heads-up a {
      color: var(--fg);
      text-decoration: underline;
    }
    .welcome-heads-up p {
      margin: 0;
    }
    .welcome-heads-up strong {
      color: var(--fg);
      font-weight: 600;
    }
    .welcome-heads-up-intro {
      margin: 0 0 4px;
    }
    .welcome-heads-up-items {
      margin: 0;
      padding-left: 18px;
    }
    .welcome-heads-up-items li {
      margin: 2px 0;
    }

    /* In-app "Save as" prompt for non-FSA browsers. Reuses the welcome
       dialog's card styling for visual consistency. */
    dialog#save-as-dialog {
      border: none;
      padding: 0;
      background: transparent;
      color: var(--fg);
      max-width: min(280px, calc(100% - 32px));
      outline: none;
    }
    dialog#save-as-dialog::backdrop {
      background: rgba(0, 0, 0, 0.55);
    }
    .save-as-card {
      /* Width override; everything else inherits from .welcome-card */
      max-width: 100%;
    }
    .save-as-title {
      margin: 0 0 10px;
      font-size: 15px;
      font-weight: 600;
      text-align: center;
    }
    #save-as-name {
      display: block;
      box-sizing: border-box;
      width: 100%;
      margin: 0 0 12px;
      padding: 8px 10px;
      border: 1px solid var(--muted);
      border-radius: 6px;
      background: var(--bg);
      color: var(--fg);
      font: inherit;
      font-size: 14px;
    }
    #save-as-name:focus {
      outline: 2px solid var(--muted);
      outline-offset: -2px;
    }
    .save-as-actions {
      display: flex;
      gap: 8px;
    }
    .save-as-actions .welcome-btn {
      flex: 1 1 0;
      min-width: 0;
      margin: 0;
    }
    /* Secondary (Cancel) variant of the welcome button — transparent so
       Save reads as the primary action. */
    .save-as-cancel-btn {
      background: transparent;
      color: var(--fg);
      border-color: var(--muted);
    }
  </style>
</head>
<body>
  <div id="editor-wrap">
    <div id="line-gutter" aria-hidden="true"><div id="line-gutter-inner"></div></div>
    <textarea id="text-editor" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off" wrap="soft"></textarea>
    <div id="editor-mirror" aria-hidden="true"></div>
  </div>
  <button id="theme-toggle" type="button" aria-label="Toggle dark/light theme" title="Toggle theme"></button>
  <button id="menu-toggle" type="button" aria-label="Show menu" title="Menu">
    <img src="./icons/icon-192.png" alt="" aria-hidden="true" />
  </button>

  <dialog id="welcome-dialog" aria-label="DedTxt menu">
    <form method="dialog" class="welcome-card">
      <button type="button" class="welcome-icon-btn" id="welcome-icon-btn" aria-label="About DedTxt">
        <img class="welcome-icon" src="./icons/icon-512.png" alt="" aria-hidden="true" />
      </button>
      <p class="welcome-sub">A dead simple plain-text editor.</p>
      <p class="welcome-version"><span id="welcome-version">v0.0.0</span></p>
      <div class="welcome-shortcuts">
        <button type="button" class="welcome-shortcut" data-action="this-dialog">
          <span>This</span>
          <span class="welcome-shortcut-key" data-key="this-dialog">ESC</span>
        </button>
        <button type="button" class="welcome-shortcut" data-action="new">
          <span>New</span>
          <span class="welcome-shortcut-key" data-key="new">Ctrl + N</span>
        </button>
        <button type="button" class="welcome-shortcut" data-action="open">
          <span>Open</span>
          <span class="welcome-shortcut-key" data-key="open">Ctrl + O</span>
        </button>
        <button type="button" class="welcome-shortcut" data-action="save">
          <span>Save</span>
          <span class="welcome-shortcut-key" data-key="save">Ctrl + S</span>
        </button>
      </div>
      <div class="welcome-heads-up" hidden></div>
      <p class="welcome-downloads">
        <a href="https://github.com/cportka/dedtxt/releases/latest" target="_blank" rel="noopener">Get desktop builds →</a>
      </p>
      <button type="button" id="welcome-dismiss" class="welcome-btn">Ok</button>
    </form>
    <div id="info-popup" class="info-popup" hidden>
      <p>by chris portka</p>
      <p><a href="https://venmo.com/portka" target="_blank" rel="noopener">venmo me a donation</a></p>
      <p><a href="https://github.com/cportka/dedtxt/blob/main/PRIVACY.md" target="_blank" rel="noopener">privacy</a></p>
    </div>
  </dialog>

  <dialog id="save-as-dialog" aria-label="Save as">
    <form method="dialog" class="welcome-card save-as-card">
      <p class="save-as-title">Save as</p>
      <input type="text" id="save-as-name" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
      <div class="save-as-actions">
        <button type="button" id="save-as-cancel" class="welcome-btn save-as-cancel-btn">Cancel</button>
        <button type="button" id="save-as-ok" class="welcome-btn">Save</button>
      </div>
    </form>
  </dialog>

  <script type="module" src="./renderer.js"></script>
</body>
</html>

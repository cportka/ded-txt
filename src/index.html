<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data:; manifest-src 'self'; worker-src 'self';" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111111" id="theme-color-meta" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="DedTxt" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icons/favicon.png" type="image/png" />
  <link rel="apple-touch-icon" href="./icons/icon-512.png" />
  <script src="./theme-init.js"></script>
  <title>DedTxt</title>
  <style>
    :root[data-theme="dark"] {
      color-scheme: dark;
      --bg: #111111;
      --fg: #f4f4f4;
      --muted: #666666;
    }
    :root[data-theme="light"] {
      color-scheme: light;
      --bg: #ffffff;
      --fg: #111111;
      --muted: #999999;
    }
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--fg);
    }
    body {
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      box-sizing: border-box;
      position: relative;
    }
    #text-editor {
      display: block;
      width: 100%;
      height: 100%;
      margin: 0;
      border: 0;
      padding: 12px 14px;
      box-sizing: border-box;
      resize: none;
      background: transparent;
      color: inherit;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      font-size: 14px;
      line-height: 1.45;
      tab-size: 4;
      -moz-tab-size: 4;
      white-space: pre;
      overflow: auto;
    }
    #text-editor:focus { outline: none; }
    #text-editor::placeholder { color: var(--muted); }
    #theme-toggle {
      position: fixed;
      bottom: max(6px, env(safe-area-inset-bottom));
      right: max(6px, env(safe-area-inset-right));
      width: 12px;
      height: 12px;
      padding: 0;
      margin: 0;
      border-radius: 50%;
      background: linear-gradient(90deg, var(--fg) 0 50%, var(--bg) 50% 100%);
      border: 1px solid var(--fg);
      cursor: pointer;
      opacity: 0.2;
      transition: opacity 0.15s ease;
      z-index: 10;
    }
    #theme-toggle:hover,
    #theme-toggle:focus-visible {
      opacity: 1;
      outline: none;
    }
  </style>
</head>
<body>
  <textarea id="text-editor" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off" wrap="off"></textarea>
  <button id="theme-toggle" type="button" aria-label="Toggle dark/light theme" title="Toggle theme"></button>
  <script type="module" src="./renderer.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data:; manifest-src 'self'; worker-src 'self';" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111111" id="theme-color-meta" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="DedTxt" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icons/favicon.png" type="image/png" />
  <link rel="apple-touch-icon" href="./icons/icon-512.png" />
  <script src="./theme-init.js"></script>
  <title>DedTxt</title>
  <style>
    :root[data-theme="dark"] {
      color-scheme: dark;
      --bg: #111111;
      --fg: #f4f4f4;
      --muted: #666666;
    }
    :root[data-theme="light"] {
      color-scheme: light;
      --bg: #ffffff;
      --fg: #111111;
      --muted: #999999;
    }
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--fg);
    }
    body {
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      box-sizing: border-box;
      position: relative;
    }
    #text-editor {
      display: block;
      width: 100%;
      height: 100%;
      margin: 0;
      border: 0;
      padding: 12px 14px;
      box-sizing: border-box;
      resize: none;
      background: transparent;
      color: inherit;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      font-size: 14px;
      line-height: 1.45;
      tab-size: 4;
      -moz-tab-size: 4;
      white-space: pre;
      overflow: auto;
    }
    #text-editor:focus { outline: none; }
    #text-editor::placeholder { color: var(--muted); }
    #theme-toggle {
      position: fixed;
      bottom: max(6px, env(safe-area-inset-bottom));
      right: max(6px, env(safe-area-inset-right));
      width: 12px;
      height: 12px;
      padding: 0;
      margin: 0;
      border-radius: 50%;
      background: linear-gradient(90deg, var(--fg) 0 50%, var(--bg) 50% 100%);
      border: 1px solid var(--fg);
      cursor: pointer;
      opacity: 0.2;
      transition: opacity 0.15s ease;
      z-index: 10;
    }
    #theme-toggle:hover,
    #theme-toggle:focus-visible {
      opacity: 1;
      outline: none;
    }

    /* First-visit welcome dialog. Themed via the same CSS variables as the
       editor so it follows light/dark automatically. */
    dialog#welcome-dialog {
      border: none;
      padding: 0;
      background: transparent;
      color: var(--fg);
      max-width: min(420px, calc(100% - 32px));
    }
    dialog#welcome-dialog::backdrop {
      background: rgba(0, 0, 0, 0.55);
    }
    .welcome-card {
      background: var(--bg);
      border: 1px solid var(--muted);
      border-radius: 12px;
      padding: 24px;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      line-height: 1.45;
    }
    .welcome-card h1 {
      margin: 0 0 4px;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.01em;
      text-align: center;
    }
    .welcome-icon {
      display: block;
      width: 96px;
      height: 96px;
      margin: 12px auto 4px;
      border-radius: 20px;
    }
    .welcome-sub {
      margin: 0 0 6px;
      color: var(--muted);
      font-size: 14px;
      text-align: center;
    }
    .welcome-version {
      margin: 0 0 20px;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
    }
    .welcome-version #welcome-version.new {
      background: var(--fg);
      color: var(--bg);
      padding: 1px 8px;
      border-radius: 4px;
      font-weight: 600;
    }
    .welcome-shortcuts {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px 16px;
      margin: 0 0 16px;
      font-size: 14px;
    }
    .welcome-shortcuts dt { margin: 0; }
    .welcome-shortcuts dd {
      margin: 0;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      color: var(--muted);
      text-align: right;
      white-space: nowrap;
    }
    .welcome-downloads {
      margin: 0 0 16px;
      padding: 12px 0 0;
      border-top: 1px solid var(--muted);
      text-align: center;
      font-size: 14px;
    }
    .welcome-downloads a {
      color: var(--fg);
      text-decoration: none;
      border-bottom: 1px solid var(--muted);
      padding-bottom: 1px;
    }
    .welcome-downloads a:hover {
      border-bottom-color: var(--fg);
    }
    .welcome-dont-show {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 0 0 16px;
      font-size: 13px;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
    }
    .welcome-dont-show input { margin: 0; cursor: pointer; }
    .welcome-btn {
      display: block;
      width: 100%;
      padding: 10px 16px;
      border-radius: 8px;
      border: 1px solid var(--fg);
      background: var(--fg);
      color: var(--bg);
      font: inherit;
      font-weight: 600;
      cursor: pointer;
    }
    .welcome-btn:hover { opacity: 0.92; }
  </style>
</head>
<body>
  <textarea id="text-editor" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off" wrap="off"></textarea>
  <button id="theme-toggle" type="button" aria-label="Toggle dark/light theme" title="Toggle theme"></button>

  <dialog id="welcome-dialog" aria-labelledby="welcome-title">
    <form method="dialog" class="welcome-card">
      <h1 id="welcome-title">Welcome to DedTxt</h1>
      <img class="welcome-icon" src="./icons/icon-512.png" alt="" aria-hidden="true" />
      <p class="welcome-sub">A dead simple plain-text editor.</p>
      <p class="welcome-version"><span id="welcome-version">v0.0.0</span></p>
      <dl class="welcome-shortcuts">
        <dt>New</dt>     <dd data-key="new">Ctrl + N</dd>
        <dt>Open</dt>    <dd data-key="open">Ctrl + O</dd>
        <dt>Save</dt>    <dd data-key="save">Ctrl + S</dd>
        <dt>Save As</dt> <dd data-key="save-as">Ctrl + Shift + S</dd>
        <dt>Quit</dt>    <dd data-key="quit">Alt + F4</dd>
      </dl>
      <p class="welcome-downloads">
        <a href="https://github.com/cportka/dedtxt/releases/latest" target="_blank" rel="noopener">Get desktop builds →</a>
      </p>
      <label class="welcome-dont-show">
        <input type="checkbox" id="welcome-dont-show" checked />
        Don't show this again
      </label>
      <button type="button" id="welcome-dismiss" class="welcome-btn">Ok</button>
    </form>
  </dialog>

  <script type="module" src="./renderer.js"></script>
</body>
</html>

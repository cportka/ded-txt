<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self'; script-src 'self'; img-src 'self' data:; manifest-src 'self'; worker-src 'self';" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111111" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="DedTxt" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icons/favicon.png" type="image/png" />
  <link rel="apple-touch-icon" href="./icons/icon-512.png" />
  <link rel="stylesheet" href="./styles.css" />
  <title>DedTxt</title>
</head>
<body>
  <div id="editor-wrap">
    <div id="line-gutter" aria-hidden="true"><div id="line-gutter-inner"></div></div>
    <textarea id="text-editor" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off" wrap="soft"></textarea>
    <div id="editor-mirror" aria-hidden="true"></div>
    <form id="find-bar" hidden onsubmit="return false">
      <div class="find-row">
        <input type="text" id="find-input" placeholder="find" autocomplete="off" spellcheck="false" />
        <span id="find-counter" class="find-counter">0 / 0</span>
        <button type="button" id="find-prev" class="find-btn" title="Previous (Shift+Enter)" aria-label="Previous match">↑</button>
        <button type="button" id="find-next" class="find-btn" title="Next (Enter)" aria-label="Next match">↓</button>
        <button type="button" id="find-case" class="find-toggle" title="Case sensitive" aria-pressed="false" aria-label="Case sensitive">Aa</button>
        <button type="button" id="find-word" class="find-toggle" title="Whole word" aria-pressed="false" aria-label="Whole word">\b</button>
        <button type="button" id="find-regex" class="find-toggle" title="Regular expression" aria-pressed="false" aria-label="Regular expression">.*</button>
        <button type="button" id="find-replace-toggle" class="find-toggle" title="Toggle replace" aria-pressed="false" aria-label="Toggle replace">⇄</button>
        <button type="button" id="find-close" class="find-btn" title="Close (Esc)" aria-label="Close find bar">✕</button>
      </div>
      <div class="find-row" id="find-replace-row" hidden>
        <input type="text" id="find-replace-input" placeholder="replace" autocomplete="off" spellcheck="false" />
        <button type="button" id="find-replace" class="find-btn find-replace-btn" title="Replace current match">Replace</button>
        <button type="button" id="find-replace-all" class="find-btn find-replace-btn" title="Replace all matches">All</button>
      </div>
    </form>
  </div>
  <button id="menu-toggle" type="button" aria-label="Show menu" title="Menu">
    <img src="./icons/icon-192.png" alt="" aria-hidden="true" />
  </button>

  <dialog id="welcome-dialog" aria-label="DedTxt menu">
    <form method="dialog" class="welcome-card">
      <button type="button" class="welcome-icon-btn" id="welcome-icon-btn" aria-label="About DedTxt">
        <img class="welcome-icon" src="./icons/icon-512.png" alt="" aria-hidden="true" />
      </button>
      <p class="welcome-sub">A dead simple plain-text editor.</p>
      <p class="welcome-version"><span id="welcome-version">v0.0.0</span></p>
      <div class="welcome-shortcuts">
        <button type="button" class="welcome-shortcut" data-action="this-dialog">
          <span>This</span>
          <span class="welcome-shortcut-key" data-key="this-dialog">ESC</span>
        </button>
        <button type="button" class="welcome-shortcut" data-action="new">
          <span>New</span>
          <span class="welcome-shortcut-key" data-key="new">Ctrl + N</span>
        </button>
        <button type="button" class="welcome-shortcut" data-action="open">
          <span>Open</span>
          <span class="welcome-shortcut-key" data-key="open">Ctrl + O</span>
        </button>
        <button type="button" class="welcome-shortcut" data-action="save">
          <span>Save</span>
          <span class="welcome-shortcut-key" data-key="save">Ctrl + S</span>
        </button>
        <button type="button" class="welcome-shortcut" data-action="find">
          <span>Find</span>
          <span class="welcome-shortcut-key" data-key="find">Ctrl + F</span>
        </button>
      </div>
      <div class="welcome-heads-up" hidden></div>
      <p class="welcome-downloads">
        <a href="https://github.com/cportka/dedtxt/releases/latest" target="_blank" rel="noopener">Get desktop builds →</a>
      </p>
    </form>
    <div id="info-popup" class="info-popup" hidden>
      <p><a href="https://venmo.com/portka" target="_blank" rel="noopener">venmo me a donation</a></p>
      <p>by chris portka</p>
      <p><a href="https://github.com/cportka/dedtxt/blob/main/PRIVACY.md" target="_blank" rel="noopener">privacy</a></p>
    </div>
  </dialog>

  <dialog id="save-as-dialog" aria-label="Save as">
    <form method="dialog" class="welcome-card save-as-card">
      <p class="save-as-title">Save as</p>
      <input type="text" id="save-as-name" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
      <div class="save-as-actions">
        <button type="button" id="save-as-cancel" class="welcome-btn save-as-cancel-btn">Cancel</button>
        <button type="button" id="save-as-ok" class="welcome-btn">Save</button>
      </div>
    </form>
  </dialog>

  <script type="module" src="./renderer.js"></script>
</body>
</html>
